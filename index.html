<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>
<style>
  :root {
    color-scheme: light;
  }
  .viz-root {
    --surface-1:      #fcfcfb;
    --page-plane:     #f9f9f7;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --gridline:       #e1e0d9;
    --baseline:       #c3c2b7;
    --border:         rgba(11,11,11,0.10);
    --success:        #006300;

    --cat-1: #2a78d6; /* Meals & Entertainment */
    --cat-2: #008300; /* Electronics & Equipment */
    --cat-3: #e87ba4; /* Groceries & Pantry */
    --cat-4: #eda100; /* Travel & Transport */
    --cat-5: #1baf7a; /* Office & Supplies */
    --cat-6: #eb6834; /* Accommodation */
    --cat-7: #4a3aa7; /* Client & Marketing */
    --cat-8: #e34948; /* Other */

    --seq-400: #3987e5;
    --seq-450: #2a78d6;
    --seq-500: #256abf;
  }
  @media (prefers-color-scheme: dark) {
    :root:where(:not([data-theme="light"])) .viz-root {
      color-scheme: dark;
      --surface-1:      #1a1a19;
      --page-plane:     #0d0d0d;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --gridline:       #2c2c2a;
      --baseline:       #383835;
      --border:         rgba(255,255,255,0.10);
      --success:        #0ca30c;

      --cat-1: #3987e5;
      --cat-2: #008300;
      --cat-3: #d55181;
      --cat-4: #c98500;
      --cat-5: #199e70;
      --cat-6: #d95926;
      --cat-7: #9085e9;
      --cat-8: #e66767;
    }
  }
  :root[data-theme="dark"] .viz-root {
    color-scheme: dark;
    --surface-1:      #1a1a19;
    --page-plane:     #0d0d0d;
    --text-primary:   #ffffff;
    --text-secondary: #c3c2b7;
    --text-muted:     #898781;
    --gridline:       #2c2c2a;
    --baseline:       #383835;
    --border:         rgba(255,255,255,0.10);
    --success:        #0ca30c;

    --cat-1: #3987e5;
    --cat-2: #008300;
    --cat-3: #d55181;
    --cat-4: #c98500;
    --cat-5: #199e70;
    --cat-6: #d95926;
    --cat-7: #9085e9;
    --cat-8: #e66767;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--page-plane);
    color: var(--text-primary);
  }
  .viz-root { min-height: 100vh; padding-bottom: 60px; }

  .app-header {
    padding: 24px 28px 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
  }
  .app-header h1 { font-size: 22px; margin: 0 0 4px; }
  .app-header p { margin: 0; color: var(--text-secondary); font-size: 13px; }
  .theme-toggle {
    border: 1px solid var(--border); background: var(--surface-1); color: var(--text-secondary);
    border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer;
  }

  .toolbar {
    margin: 0 28px 20px; padding: 14px 16px; background: var(--surface-1);
    border: 1px solid var(--border); border-radius: 12px;
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  }
  .toolbar label { font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 3px; }
  .toolbar select, .toolbar input[type="text"] {
    padding: 7px 10px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--page-plane); color: var(--text-primary); font-size: 13px; min-width: 150px;
  }
  .toolbar .field { display:flex; flex-direction: column; }
  .toolbar .spacer { flex: 1; }
  .btn {
    border: 1px solid var(--border); background: var(--page-plane); color: var(--text-primary);
    border-radius: 7px; padding: 8px 14px; font-size: 13px; cursor: pointer; font-weight: 500;
  }
  .btn:hover { filter: brightness(0.97); }
  .btn.primary { background: var(--cat-1); color: white; border-color: var(--cat-1); }
  .btn.danger-text { color: var(--cat-8); border: none; background: none; padding: 4px 8px; font-size: 12px; }
  #importFile { display: none; }

  .section { margin: 0 28px 28px; }
  .section-title { font-size: 15px; font-weight: 600; margin: 0 0 12px; display: flex; align-items: center; gap: 8px; }
  .section-title .hint { font-weight: 400; color: var(--text-muted); font-size: 12px; }

  .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
  .stat-tile {
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px;
  }
  .stat-tile .label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .stat-tile .value { font-size: 24px; font-weight: 600; }
  .stat-tile .sub { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
  .stat-tile .swatch { display:inline-block; width:10px; height:10px; border-radius:2px; margin-right:6px; }

  .chart-grid { display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; align-items: start; }
  @media (max-width: 900px) { .chart-grid { grid-template-columns: 1fr; } .stat-row { grid-template-columns: repeat(2,1fr); } }

  .card {
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px;
  }
  .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .card-head h3 { font-size: 13px; margin: 0; font-weight: 600; }
  .table-toggle {
    font-size: 11px; color: var(--text-secondary); background: none; border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 8px; cursor: pointer;
  }

  svg { overflow: visible; }
  svg text { fill: var(--text-secondary); font-size: 11px; font-family: system-ui, -apple-system, sans-serif; }
  .axis-line { stroke: var(--baseline); stroke-width: 1; }
  .grid-line { stroke: var(--gridline); stroke-width: 1; }
  .bar-seg { cursor: pointer; }
  .bar-label { fill: var(--text-primary); font-size: 11px; font-weight: 600; }

  .legend { display: flex; flex-wrap: wrap; gap: 10px 16px; margin-top: 10px; font-size: 12px; color: var(--text-secondary); }
  .legend-item { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .legend-item.muted { opacity: 0.35; }
  .legend-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  .tooltip {
    position: fixed; pointer-events: none; background: var(--text-primary); color: var(--surface-1);
    font-size: 12px; padding: 6px 10px; border-radius: 6px; z-index: 50; display: none; max-width: 240px;
    line-height: 1.4;
  }

  table.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  table.data-table th, table.data-table td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--gridline); }
  table.data-table th { color: var(--text-muted); font-weight: 500; }

  .month-group { margin-bottom: 18px; }
  .month-header {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 10px 14px; background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 10px; cursor: pointer; user-select: none;
  }
  .month-header .title { font-size: 14px; font-weight: 600; }
  .month-header .meta { font-size: 12px; color: var(--text-secondary); }
  .month-header .caret { transition: transform 0.15s; color: var(--text-muted); }
  .month-header.collapsed .caret { transform: rotate(-90deg); }
  .month-body { margin-top: 10px; display: grid; gap: 10px; }
  .month-body.hidden { display: none; }

  .receipt-card {
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px;
  }
  .receipt-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
  .receipt-vendor { font-size: 14px; font-weight: 600; }
  .receipt-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .type-pill {
    display: inline-flex; align-items: center; gap: 5px; font-size: 11px; padding: 3px 9px; border-radius: 999px;
    background: var(--page-plane); border: 1px solid var(--border); color: var(--text-secondary); margin-top: 6px;
  }
  .type-pill .dot { width: 7px; height: 7px; border-radius: 50%; }
  .receipt-amount { font-size: 18px; font-weight: 700; white-space: nowrap; }
  .receipt-amount .gst { font-size: 11px; font-weight: 400; color: var(--text-muted); display:block; text-align: right;}

  .items-list { margin: 10px 0; font-size: 12px; color: var(--text-secondary); }
  .items-list div { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px dashed var(--gridline); }
  .items-list div:last-child { border-bottom: none; }

  .manual-fields { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 12px; }
  .manual-fields .field label { font-size: 10px; color: var(--text-muted); display:block; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.03em; }
  .manual-fields input, .manual-fields select {
    width: 100%; padding: 7px 9px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--page-plane); color: var(--text-primary); font-size: 12px;
  }
  .receipt-actions { display: flex; justify-content: flex-end; margin-top: 8px; gap: 6px; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; }

  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface-1); border-radius: 14px; padding: 22px; width: 100%; max-width: 560px; max-height: 88vh; overflow-y: auto;
    border: 1px solid var(--border);
  }
  .modal h2 { font-size: 16px; margin: 0 0 14px; }
  .modal .field { margin-bottom: 12px; }
  .modal label { font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 4px; }
  .modal input, .modal select { width: 100%; padding: 8px 10px; border-radius: 7px; border: 1px solid var(--border); background: var(--page-plane); color: var(--text-primary); font-size: 13px; }
  .modal .item-row { display: grid; grid-template-columns: 2fr 0.6fr 0.8fr auto; gap: 8px; margin-bottom: 6px; align-items: center; }
  .modal .item-row input { font-size: 12px; padding: 6px 8px; }
  .modal .remove-item { background: none; border: none; color: var(--cat-8); cursor: pointer; font-size: 16px; padding: 0 4px; }
  .modal-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; gap: 10px; }
  .modal-total { font-size: 13px; color: var(--text-secondary); }
</style>
</head>
<body>
<div class="viz-root" id="vizRoot">

  <div class="app-header">
    <div>
      <h1>Expense Tracker</h1>
      <p>Receipts parsed from uploads, grouped by month &middot; edit the manual fields inline &middot; use the dashboard to query by type or month</p>
    </div>
    <button class="theme-toggle" id="themeToggle">Toggle dark mode</button>
  </div>

  <div class="toolbar">
    <div class="field">
      <label for="filterMonth">Month</label>
      <select id="filterMonth"><option value="all">All months</option></select>
    </div>
    <div class="field">
      <label for="filterType">Expense type</label>
      <select id="filterType"><option value="all">All types</option></select>
    </div>
    <div class="field">
      <label for="searchBox">Search</label>
      <input type="text" id="searchBox" placeholder="Vendor, item, purpose...">
    </div>
    <div class="spacer"></div>
    <button class="btn" id="clearFilters">Clear filters</button>
    <button class="btn" id="exportBtn">Export JSON</button>
    <button class="btn" id="importBtn">Import JSON</button>
    <input type="file" id="importFile" accept="application/json">
    <button class="btn primary" id="addReceiptBtn">+ Add receipt</button>
  </div>

  <div class="section">
    <div class="stat-row" id="statRow"></div>
    <div class="chart-grid">
      <div class="card">
        <div class="card-head">
          <h3>Spend by month, by expense type</h3>
          <button class="table-toggle" data-target="monthChart">Table view</button>
        </div>
        <div id="monthChartWrap"><svg id="monthChart" width="100%" height="260"></svg></div>
        <div class="legend" id="monthLegend"></div>
        <div id="monthChartTable" style="display:none;"></div>
      </div>
      <div class="card">
        <div class="card-head">
          <h3>Total by expense type</h3>
          <button class="table-toggle" data-target="typeChart">Table view</button>
        </div>
        <div id="typeChartWrap"><svg id="typeChart" width="100%" height="260"></svg></div>
        <div id="typeChartTable" style="display:none;"></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Receipt detail <span class="hint" id="resultCount"></span></div>
    <div id="monthGroups"></div>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <h2>Add a receipt</h2>
      <div class="field">
        <label>Date</label>
        <input type="date" id="mDate">
      </div>
      <div class="field">
        <label>Vendor / merchant</label>
        <input type="text" id="mVendor" placeholder="e.g. Grab, Starbucks...">
      </div>
      <div class="field">
        <label>Expense type</label>
        <select id="mType"></select>
      </div>
      <div class="field">
        <label>Line items</label>
        <div id="itemRows"></div>
        <button class="btn" id="addItemRow" type="button" style="margin-top:4px;">+ Add line item</button>
      </div>
      <div class="field">
        <label>Receipts from</label>
        <input type="text" id="mFrom" placeholder="e.g. Employee name / department">
      </div>
      <div class="field">
        <label>Purpose (if any)</label>
        <input type="text" id="mPurpose" placeholder="e.g. Client meeting, team lunch...">
      </div>
      <div class="field">
        <label>Approved by</label>
        <input type="text" id="mApproved" placeholder="e.g. Manager name">
      </div>
      <div class="modal-footer">
        <div class="modal-total" id="modalTotal">Total: $0.00</div>
        <div>
          <button class="btn" id="cancelModal" type="button">Cancel</button>
          <button class="btn primary" id="saveModal" type="button">Save receipt</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
(function(){

  var CATEGORIES = [
    { key: "Meals & Entertainment", color: "var(--cat-1)" },
    { key: "Electronics & Equipment", color: "var(--cat-2)" },
    { key: "Groceries & Pantry", color: "var(--cat-3)" },
    { key: "Travel & Transport", color: "var(--cat-4)" },
    { key: "Office & Supplies", color: "var(--cat-5)" },
    { key: "Accommodation", color: "var(--cat-6)" },
    { key: "Client & Marketing", color: "var(--cat-7)" },
    { key: "Other", color: "var(--cat-8)" }
  ];

  function catColor(type){
    var c = CATEGORIES.find(function(c){ return c.key === type; });
    return c ? c.color : "var(--cat-8)";
  }
  function resolveVar(varExpr){
    var name = varExpr.replace("var(","").replace(")","");
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || getComputedStyle(document.getElementById('vizRoot')).getPropertyValue(name).trim();
  }

  var STATE = {
    receipts: [
      {
        id: 1, date: "2026-06-23", vendor: "Insta360@Suntec Store", receiptNo: "R003655",
        type: "Electronics & Equipment", paymentMethod: "Visa/Master", gst: 109.07,
        items: [
          { name: "Insta360 Luna Ultra Standard Bundle Cosmic Black", qty: 1, amount: 920.55 },
          { name: "Insta360 Mic Pro (1 TX + 1 RX)", qty: 1, amount: 233.10 },
          { name: "Sandisk Ext MicroSD 128GB 190M", qty: 2, amount: 103.32 },
          { name: "Insta360 Z03, Luna Ultra, Flexicare Physical Card (1 Year)", qty: 1, amount: 64.00 }
        ],
        receiptsFrom: "", purpose: "", approvedBy: ""
      },
      {
        id: 2, date: "2026-07-10", vendor: "Subway #40967-0", receiptNo: "1/A-470511",
        type: "Meals & Entertainment", paymentMethod: "MasterCard", gst: 0,
        items: [
          { name: "12\" Rst Chicken Sub", qty: 1, amount: 14.50 },
          { name: "12\" Chk-Ham Sub", qty: 1, amount: 13.30 },
          { name: "12\" B.M.T. Sub", qty: 1, amount: 14.80 },
          { name: "12\" Tuna Sub", qty: 1, amount: 13.30 },
          { name: "Avocado Caesar Chicken Ergo Bowl", qty: 1, amount: 10.50 }
        ],
        receiptsFrom: "", purpose: "", approvedBy: ""
      },
      {
        id: 3, date: "2026-07-10", vendor: "Jollibee # Suntec", receiptNo: "Queue 4186",
        type: "Meals & Entertainment", paymentMethod: "MasterCard", gst: 7.07,
        items: [
          { name: "Group Meal A (8pc Chickenjoy Bucket, Fries, Buttered Corn, 2x Coke Zero, 2x Sprite)", qty: 1, amount: 32.50 },
          { name: "Spaghetti (Ala Carte)", qty: 2, amount: 10.60 },
          { name: "8pc Chickenjoy Bucket", qty: 1, amount: 26.50 },
          { name: "5pc Chicken Tenders", qty: 1, amount: 8.50 },
          { name: "Chicken Loaded Fries (Garlic Ranch)", qty: 1, amount: 7.50 }
        ],
        receiptsFrom: "", purpose: "", approvedBy: ""
      },
      {
        id: 4, date: "2026-07-10", vendor: "Cold Storage (CS Suntec City)", receiptNo: "TR0139",
        type: "Groceries & Pantry", paymentMethod: "MasterCard", gst: 1.08,
        items: [
          { name: "CCN Water TP 1L", qty: 1, amount: 3.95 },
          { name: "Plastic Bag Charge", qty: 1, amount: 0.05 },
          { name: "Lemon Tea LS 1.5L (after discount)", qty: 1, amount: 2.45 },
          { name: "Pokka Jasmine Green Tea 1.5L (after discount)", qty: 1, amount: 2.45 },
          { name: "Pokka Oolong Tea 1.5L (after discount)", qty: 1, amount: 2.35 },
          { name: "ATH Ayataka JGT 1.5L (after discount)", qty: 1, amount: 2.15 }
        ],
        receiptsFrom: "", purpose: "", approvedBy: ""
      }
    ],
    filters: { month: "all", type: "all", search: "" },
    collapsedMonths: {}
  };

  var nextId = 5;
  function fmt(n){ return "$" + n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }
  function amountOf(r){ return r.items.reduce(function(s,i){ return s + i.amount; }, 0); }
  function monthKey(dateStr){ var d = new Date(dateStr+"T00:00:00"); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); }
  function monthLabel(key){
    var parts = key.split("-"); var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, 1);
    return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  }
  function dateLabel(dateStr){
    var d = new Date(dateStr+"T00:00:00");
    return d.toLocaleDateString('en-US', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  // ---------- filtering ----------
  function filteredReceipts(){
    var f = STATE.filters;
    return STATE.receipts.filter(function(r){
      if (f.month !== "all" && monthKey(r.date) !== f.month) return false;
      if (f.type !== "all" && r.type !== f.type) return false;
      if (f.search){
        var hay = [r.vendor, r.type, r.receiptsFrom, r.purpose, r.approvedBy].concat(r.items.map(function(i){return i.name;})).join(" ").toLowerCase();
        if (hay.indexOf(f.search.toLowerCase()) === -1) return false;
      }
      return true;
    });
  }

  // ---------- populate filter dropdowns ----------
  function populateFilters(){
    var monthSel = document.getElementById('filterMonth');
    var typeSel = document.getElementById('filterType');
    var months = Array.from(new Set(STATE.receipts.map(function(r){ return monthKey(r.date); }))).sort();
    monthSel.innerHTML = '<option value="all">All months</option>' + months.map(function(m){
      return '<option value="'+m+'">'+monthLabel(m)+'</option>';
    }).join("");
    monthSel.value = STATE.filters.month;

    typeSel.innerHTML = '<option value="all">All types</option>' + CATEGORIES.map(function(c){
      return '<option value="'+c.key+'">'+c.key+'</option>';
    }).join("");
    typeSel.value = STATE.filters.type;
  }

  // ---------- stat tiles ----------
  function renderStats(){
    var rows = filteredReceipts();
    var total = rows.reduce(function(s,r){ return s + amountOf(r); }, 0);
    var count = rows.length;
    var avg = count ? total / count : 0;
    var byType = {};
    rows.forEach(function(r){ byType[r.type] = (byType[r.type]||0) + amountOf(r); });
    var topType = Object.keys(byType).sort(function(a,b){ return byType[b]-byType[a]; })[0];

    var html = "";
    html += statTile("Total spend", fmt(total), rows.length + " receipt" + (rows.length===1?"":"s"));
    html += statTile("Receipts", String(count), "matching current filters");
    html += statTile("Average per receipt", fmt(avg), "");
    html += statTile("Top category", topType ? topType : "—", topType ? fmt(byType[topType]) : "", topType ? catColor(topType) : null);
    document.getElementById('statRow').innerHTML = html;
  }
  function statTile(label, value, sub, color){
    return '<div class="stat-tile"><div class="label">'+label+'</div><div class="value">'+
      (color ? '<span class="swatch" style="background:'+color+'"></span>' : '') + value +
      '</div><div class="sub">'+(sub||"")+'</div></div>';
  }

  // ---------- charts ----------
  var monthChartIsTable = false, typeChartIsTable = false;
  var mutedTypes = {};

  function aggregateByMonthAndType(rows){
    var months = {};
    rows.forEach(function(r){
      var mk = monthKey(r.date);
      if (!months[mk]) months[mk] = {};
      months[mk][r.type] = (months[mk][r.type]||0) + amountOf(r);
    });
    var monthKeys = Object.keys(months).sort();
    return { monthKeys: monthKeys, months: months };
  }

  function renderMonthChart(){
    var rows = filteredReceipts();
    var agg = aggregateByMonthAndType(rows);
    var svg = document.getElementById('monthChart');
    var wrap = document.getElementById('monthChartWrap');
    var W = wrap.clientWidth || 480, H = 260;
    svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
    svg.innerHTML = "";

    var typesPresent = CATEGORIES.filter(function(c){
      return agg.monthKeys.some(function(mk){ return agg.months[mk][c.key]; });
    });

    // legend
    var legend = document.getElementById('monthLegend');
    legend.innerHTML = typesPresent.map(function(c){
      var isMuted = mutedTypes[c.key];
      return '<div class="legend-item'+(isMuted?' muted':'')+'" data-type="'+c.key+'">'+
        '<span class="legend-swatch" style="background:'+resolveVar(c.color)+'"></span>'+c.key+'</div>';
    }).join("");
    legend.querySelectorAll('.legend-item').forEach(function(el){
      el.addEventListener('click', function(){
        var t = el.getAttribute('data-type');
        mutedTypes[t] = !mutedTypes[t];
        renderMonthChart();
      });
    });

    if (monthChartIsTable){
      renderMonthTableView(agg, typesPresent);
      return;
    }

    if (agg.monthKeys.length === 0){
      svg.innerHTML = '<text x="20" y="40">No data for current filters.</text>';
      return;
    }

    var padL = 70, padR = 20, padT = 16, padB = 34;
    var plotW = W - padL - padR, plotH = H - padT - padB;
    var maxTotal = Math.max.apply(null, agg.monthKeys.map(function(mk){
      return Object.keys(agg.months[mk]).reduce(function(s,t){ return mutedTypes[t] ? s : s + agg.months[mk][t]; }, 0);
    }));
    maxTotal = maxTotal * 1.15 || 1;

    var n = agg.monthKeys.length;
    var bandW = plotW / n;
    var barW = Math.min(64, bandW * 0.5);

    // gridlines + y labels
    var steps = 4;
    for (var s = 0; s <= steps; s++){
      var val = maxTotal * s / steps;
      var y = padT + plotH - (val/maxTotal)*plotH;
      var line = document.createElementNS("http://www.w3.org/2000/svg","line");
      line.setAttribute("x1", padL); line.setAttribute("x2", W-padR);
      line.setAttribute("y1", y); line.setAttribute("y2", y);
      line.setAttribute("class", "grid-line");
      svg.appendChild(line);
      var t = document.createElementNS("http://www.w3.org/2000/svg","text");
      t.setAttribute("x", padL - 8); t.setAttribute("y", y+4); t.setAttribute("text-anchor","end");
      t.textContent = "$" + Math.round(val);
      svg.appendChild(t);
    }

    agg.monthKeys.forEach(function(mk, idx){
      var cx = padL + bandW * idx + bandW/2;
      var yCursor = padT + plotH;
      CATEGORIES.forEach(function(c){
        var v = agg.months[mk][c.key];
        if (!v || mutedTypes[c.key]) return;
        var segH = (v/maxTotal) * plotH;
        var rect = document.createElementNS("http://www.w3.org/2000/svg","rect");
        rect.setAttribute("x", cx - barW/2);
        rect.setAttribute("y", yCursor - segH);
        rect.setAttribute("width", barW);
        rect.setAttribute("height", Math.max(segH - 2, 0));
        rect.setAttribute("fill", resolveVar(c.color));
        rect.setAttribute("rx", 3);
        rect.setAttribute("class", "bar-seg");
        rect.addEventListener("mousemove", function(e){ showTooltip(e, c.key + "<br>" + monthLabel(mk) + "<br><b>" + fmt(v) + "</b>"); });
        rect.addEventListener("mouseleave", hideTooltip);
        svg.appendChild(rect);
        yCursor -= segH;
      });
      var lbl = document.createElementNS("http://www.w3.org/2000/svg","text");
      lbl.setAttribute("x", cx); lbl.setAttribute("y", H - padB + 18); lbl.setAttribute("text-anchor","middle");
      lbl.textContent = monthLabel(mk).split(" ")[0].slice(0,3) + " " + monthLabel(mk).split(" ")[1];
      svg.appendChild(lbl);

      var total = Object.keys(agg.months[mk]).reduce(function(s,t){ return mutedTypes[t] ? s : s + agg.months[mk][t]; }, 0);
      var totalLbl = document.createElementNS("http://www.w3.org/2000/svg","text");
      totalLbl.setAttribute("x", cx); totalLbl.setAttribute("y", padT + plotH - (total/maxTotal)*plotH - 8);
      totalLbl.setAttribute("text-anchor","middle"); totalLbl.setAttribute("class","bar-label");
      totalLbl.textContent = fmt(total);
      svg.appendChild(totalLbl);
    });

    var axis = document.createElementNS("http://www.w3.org/2000/svg","line");
    axis.setAttribute("x1", padL); axis.setAttribute("x2", W-padR);
    axis.setAttribute("y1", padT+plotH); axis.setAttribute("y2", padT+plotH);
    axis.setAttribute("class","axis-line");
    svg.appendChild(axis);
  }

  function renderMonthTableView(agg, typesPresent){
    var html = '<table class="data-table"><thead><tr><th>Month</th>' + typesPresent.map(function(c){return '<th>'+c.key+'</th>';}).join("") + '<th>Total</th></tr></thead><tbody>';
    agg.monthKeys.forEach(function(mk){
      var total = 0;
      html += '<tr><td>'+monthLabel(mk)+'</td>';
      typesPresent.forEach(function(c){
        var v = agg.months[mk][c.key] || 0;
        total += v;
        html += '<td>'+(v?fmt(v):"—")+'</td>';
      });
      html += '<td><b>'+fmt(total)+'</b></td></tr>';
    });
    html += '</tbody></table>';
    document.getElementById('monthChartTable').innerHTML = html;
  }

  function renderTypeChart(){
    var rows = filteredReceipts();
    var svg = document.getElementById('typeChart');
    var wrap = document.getElementById('typeChartWrap');
    var W = wrap.clientWidth || 380, H = 260;
    svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
    svg.innerHTML = "";

    var byType = {};
    rows.forEach(function(r){ byType[r.type] = (byType[r.type]||0) + amountOf(r); });
    var typesPresent = CATEGORIES.filter(function(c){ return byType[c.key]; });

    if (typeChartIsTable){
      var html = '<table class="data-table"><thead><tr><th>Type</th><th>Total</th></tr></thead><tbody>';
      typesPresent.forEach(function(c){ html += '<tr><td>'+c.key+'</td><td>'+fmt(byType[c.key])+'</td></tr>'; });
      html += '</tbody></table>';
      document.getElementById('typeChartTable').innerHTML = html;
      return;
    }

    if (typesPresent.length === 0){
      svg.innerHTML = '<text x="20" y="40">No data for current filters.</text>';
      return;
    }

    var padL = 172, padR = 50, padT = 10, padB = 10;
    var rowH = Math.min(34, (H - padT - padB) / typesPresent.length);
    var plotW = W - padL - padR;
    var maxVal = Math.max.apply(null, typesPresent.map(function(c){ return byType[c.key]; })) * 1.15;

    typesPresent.forEach(function(c, idx){
      var y = padT + idx * rowH;
      var v = byType[c.key];
      var barW = (v/maxVal) * plotW;

      var label = document.createElementNS("http://www.w3.org/2000/svg","text");
      label.setAttribute("x", padL - 10); label.setAttribute("y", y + rowH/2 + 4); label.setAttribute("text-anchor","end");
      label.textContent = c.key;
      svg.appendChild(label);

      var rect = document.createElementNS("http://www.w3.org/2000/svg","rect");
      rect.setAttribute("x", padL); rect.setAttribute("y", y + rowH*0.18);
      rect.setAttribute("width", Math.max(barW,2)); rect.setAttribute("height", rowH*0.64);
      rect.setAttribute("fill", resolveVar(c.color)); rect.setAttribute("rx", 3);
      rect.setAttribute("class","bar-seg");
      rect.addEventListener("mousemove", function(e){ showTooltip(e, c.key + "<br><b>" + fmt(v) + "</b>"); });
      rect.addEventListener("mouseleave", hideTooltip);
      svg.appendChild(rect);

      var valLbl = document.createElementNS("http://www.w3.org/2000/svg","text");
      valLbl.setAttribute("x", padL + barW + 8); valLbl.setAttribute("y", y + rowH/2 + 4);
      valLbl.setAttribute("class","bar-label");
      valLbl.textContent = fmt(v);
      svg.appendChild(valLbl);
    });
  }

  function showTooltip(e, html){
    var tip = document.getElementById('tooltip');
    tip.innerHTML = html;
    tip.style.display = 'block';
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top = (e.clientY + 14) + 'px';
  }
  function hideTooltip(){ document.getElementById('tooltip').style.display = 'none'; }

  // ---------- detail list ----------
  function renderDetail(){
    var rows = filteredReceipts();
    document.getElementById('resultCount').textContent = "(" + rows.length + " of " + STATE.receipts.length + " shown)";

    var byMonth = {};
    rows.forEach(function(r){
      var mk = monthKey(r.date);
      if (!byMonth[mk]) byMonth[mk] = [];
      byMonth[mk].push(r);
    });
    var monthKeys = Object.keys(byMonth).sort().reverse();

    var container = document.getElementById('monthGroups');
    if (monthKeys.length === 0){
      container.innerHTML = '<div class="empty-state">No receipts match the current filters.</div>';
      return;
    }

    container.innerHTML = monthKeys.map(function(mk){
      var list = byMonth[mk].sort(function(a,b){ return a.date < b.date ? 1 : -1; });
      var subtotal = list.reduce(function(s,r){ return s + amountOf(r); }, 0);
      var collapsed = !!STATE.collapsedMonths[mk];
      return '<div class="month-group">' +
        '<div class="month-header'+(collapsed?' collapsed':'')+'" data-month="'+mk+'">' +
          '<div><span class="caret">▼</span> <span class="title">'+monthLabel(mk)+'</span></div>' +
          '<div class="meta">'+list.length+' receipt'+(list.length===1?'':'s')+' &middot; <b>'+fmt(subtotal)+'</b></div>' +
        '</div>' +
        '<div class="month-body'+(collapsed?' hidden':'')+'" data-month-body="'+mk+'">' +
          list.map(renderReceiptCard).join("") +
        '</div>' +
      '</div>';
    }).join("");

    container.querySelectorAll('.month-header').forEach(function(el){
      el.addEventListener('click', function(){
        var mk = el.getAttribute('data-month');
        STATE.collapsedMonths[mk] = !STATE.collapsedMonths[mk];
        renderDetail();
      });
    });

    container.querySelectorAll('[data-field]').forEach(function(el){
      el.addEventListener('change', function(){
        var id = parseInt(el.getAttribute('data-id'));
        var field = el.getAttribute('data-field');
        var r = STATE.receipts.find(function(x){ return x.id === id; });
        if (!r) return;
        r[field] = el.value;
        if (field === 'type'){ renderAll(); } // type affects aggregates
      });
    });

    container.querySelectorAll('[data-delete]').forEach(function(el){
      el.addEventListener('click', function(){
        var id = parseInt(el.getAttribute('data-delete'));
        STATE.receipts = STATE.receipts.filter(function(r){ return r.id !== id; });
        renderAll();
      });
    });
  }

  function renderReceiptCard(r){
    var amt = amountOf(r);
    var color = resolveVar(catColor(r.type));
    var typeOptions = CATEGORIES.map(function(c){
      return '<option value="'+c.key+'"'+(c.key===r.type?' selected':'')+'>'+c.key+'</option>';
    }).join("");
    return '<div class="receipt-card">' +
      '<div class="receipt-top">' +
        '<div>' +
          '<div class="receipt-vendor">'+r.vendor+'</div>' +
          '<div class="receipt-sub">'+dateLabel(r.date)+' &middot; Receipt/Ref: '+(r.receiptNo||"—")+' &middot; '+(r.paymentMethod||"—")+'</div>' +
          '<div class="type-pill"><span class="dot" style="background:'+color+'"></span>'+r.type+'</div>' +
        '</div>' +
        '<div class="receipt-amount">'+fmt(amt)+(r.gst?'<span class="gst">incl. GST '+fmt(r.gst)+'</span>':'')+'</div>' +
      '</div>' +
      '<div class="items-list">' + r.items.map(function(i){
        return '<div><span>'+i.name+(i.qty>1?' &times;'+i.qty:'')+'</span><span>'+fmt(i.amount)+'</span></div>';
      }).join("") + '</div>' +
      '<div class="manual-fields">' +
        '<div class="field"><label>Expense type</label><select data-field="type" data-id="'+r.id+'">'+typeOptions+'</select></div>' +
        '<div class="field"><label>Receipts from</label><input type="text" data-field="receiptsFrom" data-id="'+r.id+'" value="'+escapeAttr(r.receiptsFrom)+'" placeholder="Employee / dept"></div>' +
        '<div class="field"><label>Purpose (if any)</label><input type="text" data-field="purpose" data-id="'+r.id+'" value="'+escapeAttr(r.purpose)+'" placeholder="Reason for expense"></div>' +
        '<div class="field"><label>Approved by</label><input type="text" data-field="approvedBy" data-id="'+r.id+'" value="'+escapeAttr(r.approvedBy)+'" placeholder="Approver name"></div>' +
      '</div>' +
      '<div class="receipt-actions"><button class="btn danger-text" data-delete="'+r.id+'">Remove receipt</button></div>' +
    '</div>';
  }
  function escapeAttr(s){ return (s||"").replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }

  // ---------- render orchestration ----------
  function renderAll(){
    populateFilters();
    renderStats();
    renderMonthChart();
    renderTypeChart();
    renderDetail();
  }

  // ---------- events: filters ----------
  document.getElementById('filterMonth').addEventListener('change', function(e){ STATE.filters.month = e.target.value; renderAll(); });
  document.getElementById('filterType').addEventListener('change', function(e){ STATE.filters.type = e.target.value; renderAll(); });
  document.getElementById('searchBox').addEventListener('input', function(e){ STATE.filters.search = e.target.value; renderAll(); });
  document.getElementById('clearFilters').addEventListener('click', function(){
    STATE.filters = { month: "all", type: "all", search: "" };
    document.getElementById('searchBox').value = "";
    renderAll();
  });

  document.querySelectorAll('.table-toggle').forEach(function(btn){
    btn.addEventListener('click', function(){
      var target = btn.getAttribute('data-target');
      if (target === 'monthChart'){
        monthChartIsTable = !monthChartIsTable;
        document.getElementById('monthChartWrap').style.display = monthChartIsTable ? 'none' : 'block';
        document.getElementById('monthChartTable').style.display = monthChartIsTable ? 'block' : 'none';
        btn.textContent = monthChartIsTable ? 'Chart view' : 'Table view';
        renderMonthChart();
      } else {
        typeChartIsTable = !typeChartIsTable;
        document.getElementById('typeChartWrap').style.display = typeChartIsTable ? 'none' : 'block';
        document.getElementById('typeChartTable').style.display = typeChartIsTable ? 'block' : 'none';
        btn.textContent = typeChartIsTable ? 'Chart view' : 'Table view';
        renderTypeChart();
      }
    });
  });

  // ---------- theme toggle ----------
  document.getElementById('themeToggle').addEventListener('click', function(){
    var root = document.documentElement;
    var cur = root.getAttribute('data-theme');
    root.setAttribute('data-theme', cur === 'dark' ? 'light' : 'dark');
    renderAll();
  });

  // ---------- export / import ----------
  document.getElementById('exportBtn').addEventListener('click', function(){
    var blob = new Blob([JSON.stringify(STATE.receipts, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'expense-tracker-data.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });
  document.getElementById('importBtn').addEventListener('click', function(){
    document.getElementById('importFile').click();
  });
  document.getElementById('importFile').addEventListener('change', function(e){
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(evt){
      try {
        var data = JSON.parse(evt.target.result);
        if (!Array.isArray(data)) throw new Error("Expected an array of receipts");
        STATE.receipts = data;
        nextId = Math.max.apply(null, data.map(function(r){ return r.id||0; }).concat([0])) + 1;
        renderAll();
      } catch(err){
        alert("Could not import file: " + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  });

  // ---------- add receipt modal ----------
  var modalBackdrop = document.getElementById('modalBackdrop');
  var mType = document.getElementById('mType');
  mType.innerHTML = CATEGORIES.map(function(c){ return '<option value="'+c.key+'">'+c.key+'</option>'; }).join("");

  function newItemRow(name, qty, amount){
    var row = document.createElement('div');
    row.className = 'item-row';
    row.innerHTML = '<input type="text" class="item-name" placeholder="Item description" value="'+escapeAttr(name||"")+'">' +
      '<input type="number" class="item-qty" placeholder="Qty" min="1" value="'+(qty||1)+'">' +
      '<input type="number" class="item-amount" placeholder="Amount" step="0.01" value="'+(amount!=null?amount:"")+'">' +
      '<button type="button" class="remove-item">&times;</button>';
    row.querySelector('.remove-item').addEventListener('click', function(){ row.remove(); updateModalTotal(); });
    row.querySelectorAll('input').forEach(function(inp){ inp.addEventListener('input', updateModalTotal); });
    return row;
  }
  function resetModal(){
    document.getElementById('mDate').value = new Date().toISOString().slice(0,10);
    document.getElementById('mVendor').value = "";
    document.getElementById('mFrom').value = "";
    document.getElementById('mPurpose').value = "";
    document.getElementById('mApproved').value = "";
    mType.value = CATEGORIES[0].key;
    var itemRows = document.getElementById('itemRows');
    itemRows.innerHTML = "";
    itemRows.appendChild(newItemRow("", 1, null));
    updateModalTotal();
  }
  function updateModalTotal(){
    var total = 0;
    document.querySelectorAll('#itemRows .item-row').forEach(function(row){
      var amt = parseFloat(row.querySelector('.item-amount').value) || 0;
      total += amt;
    });
    document.getElementById('modalTotal').textContent = "Total: " + fmt(total);
  }
  document.getElementById('addItemRow').addEventListener('click', function(){
    document.getElementById('itemRows').appendChild(newItemRow("", 1, null));
  });
  document.getElementById('addReceiptBtn').addEventListener('click', function(){
    resetModal();
    modalBackdrop.classList.add('open');
  });
  document.getElementById('cancelModal').addEventListener('click', function(){
    modalBackdrop.classList.remove('open');
  });
  modalBackdrop.addEventListener('click', function(e){
    if (e.target === modalBackdrop) modalBackdrop.classList.remove('open');
  });
  document.getElementById('saveModal').addEventListener('click', function(){
    var date = document.getElementById('mDate').value;
    var vendor = document.getElementById('mVendor').value.trim();
    if (!date || !vendor){ alert("Please fill in at least a date and vendor."); return; }
    var items = [];
    document.querySelectorAll('#itemRows .item-row').forEach(function(row){
      var name = row.querySelector('.item-name').value.trim();
      var qty = parseFloat(row.querySelector('.item-qty').value) || 1;
      var amount = parseFloat(row.querySelector('.item-amount').value) || 0;
      if (name || amount) items.push({ name: name || "Item", qty: qty, amount: amount });
    });
    if (items.length === 0) items.push({ name: "Expense", qty: 1, amount: 0 });
    var r = {
      id: nextId++,
      date: date,
      vendor: vendor,
      receiptNo: "",
      type: mType.value,
      paymentMethod: "",
      gst: 0,
      items: items,
      receiptsFrom: document.getElementById('mFrom').value.trim(),
      purpose: document.getElementById('mPurpose').value.trim(),
      approvedBy: document.getElementById('mApproved').value.trim()
    };
    STATE.receipts.push(r);
    modalBackdrop.classList.remove('open');
    renderAll();
  });

  window.addEventListener('resize', function(){ renderMonthChart(); renderTypeChart(); });

  renderAll();
})();
</script>
</body>
</html>
